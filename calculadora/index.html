<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>
    <div class = "display">
        <h1>0</h1>

    </div>

    <div class = main>
    <section class = "sessao">
        <button class = "numero" class = "botao">1</button>
        <button class = "numero" class = "botao">2</button>
        <button class = "numero" class = "botao">3</button>
        <button class = "operador" class = "botao">+</button> 
        <button class = "numero" class = "botao">4</button>
        <button class = "numero" class = "botao">5</button>
        <button class = "numero" class = "botao">6</button>
        <button class = "operador" class = "botao">-</button>
        <button class = "numero" class = "botao">7</button>
        <button class = "numero" class = "botao">8</button>
        <button class = "numero" class = "botao">9</button>
        <button class = "operador" class = "botao">X</button>
        <button class = "botao">C</button>
        <button class = "numero" class = "botao">0</button>
        <button class = "operador" class = "botao">=</button>
        <button class = "operador" class = "botao">:</button>
    </section>
    </div>
</body>
</html>
