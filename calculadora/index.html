<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div id = "display">
    </div>

    <div class = main>
    <section class = "sessao">
        <button onclick = "adicionarNumero('1')" class = "numero botao">1</button>
        <button onclick = "adicionarNumero('2')" class = "numero botao">2</button>
        <button onclick = "adicionarNumero('3')" class = "numero botao">3</button>
        <button onclick = "definirOperacao('+')" class = "operador botao">+</button> 
        <button onclick = "adicionarNumero('4')" class = "numero botao">4</button>
        <button onclick = "adicionarNumero('5')" class = "numero botao">5</button>
        <button onclick = "adicionarNumero('6')" class = "numero botao">6</button>
        <button onclick = "definirOperacao('-')" class = "operador botao">-</button>
        <button onclick = "adicionarNumero('7')" class = "numero botao">7</button>
        <button onclick = "adicionarNumero('8')" class = "numero botao">8</button>
        <button onclick = "adicionarNumero('9')" class = "numero botao">9</button>
        <button onclick = "definirOperacao('X')" class = "operador botao">X</button>
        <button onclick = "excluirTudo()" id = "excluir" class = "botao">C</button>
        <button onclick = "adicionarNumero('0')" class = "numero botao">0</button>
        <button onclick = "finalizarOperacao()" id = "igual" class = "botao">=</button>
        <button onclick = "definirOperacao(':')" class = "operador botao">:</button>
    </section>
    </div>
</body>
</html>
